version: "3.9"

services:
  traefik:
    image: traefik:3.0-alpine
    container_name: ggguide-traefik
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ggguide-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: ggguide-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ggguide}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ggguide}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ggguide}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ggguide-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ggguide-backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ggguide}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-ggguide}
      NODE_ENV: development
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./back/src:/app/src
      - /app/node_modules
    command: npm run dev
    networks:
      - ggguide-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ggguide-frontend
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
    networks:
      - ggguide-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  ggguide-network:
    driver: bridge

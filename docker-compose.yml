version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ggguide-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-ggguide}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-ggguide}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ggguide}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ggguide-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ggguide-backend
    ports:
      - "3001:3001"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ggguide}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-ggguide}
      NODE_ENV: development
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./back/src:/app/src
      - /app/node_modules
    command: npm run dev
    networks:
      - ggguide-network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ggguide-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ggguide-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  ggguide-network:
    driver: bridge
